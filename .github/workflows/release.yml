name: Create release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Install zip
        run: sudo apt install zip

      - name: Get latest code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Bundle files
        run: |
          mkdir -p ./temp/pulsar-characters/ui
          cp ./{README.md,fxmanifest.lua} ./temp/pulsar-characters
          cp -r ./{client,server,shared} ./temp/pulsar-characters
          cp -r ./ui/dist ./temp/pulsar-characters/ui/dist
          cd ./temp && zip -r ../pulsar-characters.zip ./pulsar-characters

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-CHARACTERS ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-CHARACTERS ${{ github.ref_name }}

            Character creation, selection, and lifecycle management for Pulsar Framework.

            ### Installation
            1. Download `pulsar-characters.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-characters` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-characters.zip
          prerelease: false
