name: Create release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Bump manifest version
        run: bun run .github/actions/bump-manifest-version.js
        env:
          TGT_RELEASE_VERSION: ${{ github.ref_name }}

      - name: Push version bump change
        uses: EndBug/add-and-commit@v9
        with:
          add: '["fxmanifest.lua"]'
          push: true
          default_author: github_actions
          message: "chore: bump version to ${{ github.ref_name }}"

      - name: Install dependencies
        run: bun install
        working-directory: ui

      - name: Build UI
        run: bun run build
        working-directory: ui

      - name: Bundle files
        run: |
          mkdir -p staging/pulsar-characters
          rsync -a --exclude='.github' --exclude='node_modules' --exclude='staging' . staging/pulsar-characters/
          cd staging && zip -r ../pulsar-characters.zip pulsar-characters/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "PULSAR-CHARACTERS ${{ github.ref_name }}"
          body: |
            ![Pulsar Framework](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## PULSAR-CHARACTERS ${{ github.ref_name }}

            Character creation, selection, and lifecycle management for Pulsar Framework.

            ### Installation
            1. Download `pulsar-characters.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-characters` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-characters.zip
          prerelease: false
