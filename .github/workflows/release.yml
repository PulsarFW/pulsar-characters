name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: |
          cd ui
          bun install
          bun run build

      - name: Get release name
        id: info
        run: |
          REPO="${{ github.event.repository.name }}"
          echo "upper=${REPO^^}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          zip -r pulsar-characters.zip .             --exclude='*/.git/*'             --exclude='*/.github/*'             --exclude='*/node_modules/*'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "${{ steps.info.outputs.upper }} ${{ github.event.inputs.version }}"
          body: |
            ![${{ steps.info.outputs.upper }}](https://r2.fivemanage.com/GPYOH8Hq4GPyAY7czrgLe/pulsarbanner.png)

            ## ${{ steps.info.outputs.upper }} ${{ github.event.inputs.version }}

            ### Installation
            1. Download `pulsar-characters.zip` below
            2. Extract into your server's `resources` folder
            3. Add `ensure pulsar-characters` to your `server.cfg`

            ---
            ![Pulsar Framework](https://img.shields.io/badge/Pulsar-Framework-7c3aed?style=flat-square)
            ![Built for FiveM](https://img.shields.io/badge/Built_for-FiveM-F40552?style=flat-square)
          files: pulsar-characters.zip
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
