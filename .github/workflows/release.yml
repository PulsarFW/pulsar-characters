name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and build UI
        run: |
          cd ui
          bun install
          bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "v${{ github.event.inputs.version }}"
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        uses: SethCohen/github-releases-to-discord@v1.3.2
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          color: "8141549"
          username: "Pulsar Framework"
          avatar_url: "https://raw.githubusercontent.com/${{ github.repository_owner }}/PulsarFW/main/PulsarFramework.png"
          footer_title: "Pulsar Framework"
          footer_icon_url: "https://raw.githubusercontent.com/${{ github.repository_owner }}/PulsarFW/main/PulsarFramework.png"
          footer_timestamp: true
