name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: |
          cd ui
          bun install
          bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        id: release
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "v${{ github.event.inputs.version }}"
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"Pulsar Framework\",
              \"avatar_url\": \"https://raw.githubusercontent.com/${{ github.repository_owner }}/PulsarFW/main/PulsarFramework.png\",
              \"embeds\": [{
                \"title\": \"\U0001F680 ${{ github.event.repository.name }} v${{ github.event.inputs.version }}\",
                \"url\": \"${{ steps.release.outputs.url }}\",
                \"color\": 8141549,
                \"description\": \"A new version has been released. Click to view the full changelog.\",
                \"footer\": { \"text\": \"Pulsar Framework\" }
              }]
            }"
