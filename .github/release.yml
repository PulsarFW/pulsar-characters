changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🚀 New Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: ⚡ Performance
      labels:
        - performance
        - optimization
    - title: 🧹 Maintenance
      labels:
        - chore
        - refactor
        - dependencies
    - title: 📝 Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
